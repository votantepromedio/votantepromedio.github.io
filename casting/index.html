<!DOCTYPE html>
<html lang="es-CL">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Postula al Casting · Votante Promedio</title>
  <meta name="description" content="Postula al casting del Episodio 1 de Votante Promedio. Personas comunes, posturas opuestas, sin conductor ni expertos.">
  <link rel="canonical" href="https://votantepromedio.com/casting/">
  <meta http-equiv="refresh" content="0; url=https://docs.google.com/forms/d/e/1FAIpQLSdZqzJV0dFp8aL635HBAorOIj9FSxvaijqNevQoHGqg4Mutqw/viewform">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="Postula al Casting · Votante Promedio">
  <meta property="og:description" content="Personas comunes debaten lo que divide a Chile. Postula al casting del Episodio 1.">
  <meta property="og:url" content="https://votantepromedio.com/casting/">
  <meta property="og:image" content="https://votantepromedio.com/og-image.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    :root {
      --carbon: #1A1A1A;
      --hueso: #F5F1E8;
      --ambar: #C8923A;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--hueso);
      color: var(--carbon);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    main {
      max-width: 480px;
      text-align: center;
    }
    .vp-mark {
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--ambar);
      font-size: 13px;
      margin-bottom: 20px;
      text-transform: uppercase;
    }
    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 16px;
      margin-bottom: 24px;
      opacity: 0.75;
    }
    a.button {
      display: inline-block;
      background: var(--carbon);
      color: var(--hueso);
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 16px;
      transition: background 0.2s ease;
    }
    a.button:hover, a.button:focus {
      background: var(--ambar);
      outline: none;
    }
    .small {
      font-size: 13px;
      opacity: 0.55;
      margin-top: 24px;
      margin-bottom: 0;
    }
    @media (max-width: 480px) {
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <main>
    <div class="vp-mark">Votante Promedio</div>
    <h1>Te estamos llevando al formulario de casting</h1>
    <p>Si no carga en unos segundos, usa el botón.</p>
    <a class="button" href="https://docs.google.com/forms/d/e/1FAIpQLSdZqzJV0dFp8aL635HBAorOIj9FSxvaijqNevQoHGqg4Mutqw/viewform">Ir al formulario</a>
    <p class="small">votantepromedio.com</p>
  </main>
</body>
</html>
